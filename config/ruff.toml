# brainbug's central ruff config — correctness core only.
#
# brainbug runs this against every monitored repo's source. It deliberately gates
# on REAL BUGS, not opinionated style: each repo tunes style (docstrings,
# annotations, naming, unused-args, blind-except, ...) in its own config, and
# brainbug must not be redder than a repo's own passing lint. So we do NOT enforce
# D / ANN / ARG / BLE / N / I / UP / S / SIM / etc. centrally.
#
# Add a rule here only if it catches a genuine bug across all repos. Style belongs
# in each repo's own ruff config, not in this central gate.

line-length = 120
target-version = "py311"  # overridden per-repo via --target-version (see tests/test_lint.py)

# Exclude directories with Jinja template variables in their names
exclude = ["**/[{][{]*/", "**/*[}][}]*/"]

[lint]
select = [
    "F",   # pyflakes — undefined names, unused imports, f-string / format bugs
    "E9",  # pycodestyle — syntax errors, IndentationError
    "B",   # flake8-bugbear — likely bugs and dangerous patterns
]
