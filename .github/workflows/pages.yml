# Build the status dashboard and publish it to GitHub Pages.
# Rebuilds after each brainbug run (workflow_run) so verdicts are fresh within a
# minute, plus a schedule safety-net, pushes that touch the dashboard, and on
# demand. With concurrency cancel-in-progress:false, a multi-branch sync burst
# may show a few "cancelled" Pages runs — cosmetic; the latest always deploys.
name: pages

on:
  workflow_run:
    workflows: [on-dispatch]
    types: [completed]
  push:
    branches: [main]
    paths:
      - repos.yml
      - scripts/build_dashboard.py
      - .github/workflows/pages.yml
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one deployment at a time. Do NOT cancel an in-progress deploy — let it
# finish (GitHub's recommended setting for Pages). Intermediate queued runs are
# superseded by the newest, which is fine since each rebuild is idempotent.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install pyyaml
      - name: Build dashboard
        env:
          GITHUB_TOKEN: ${{ github.token }}
          BRAINBUG_REPO: ${{ github.repository }}
        run: BUILT_AT="$(date -u '+%Y-%m-%d %H:%M UTC')" python scripts/build_dashboard.py
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - id: deploy
        uses: actions/deploy-pages@v5
